<!DOCTYPE html>
<html lang="fr" data-theme="light" data-design="A">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Générateur de Lettre de Motivation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
/* ═══════════════════════════════════════════
   TOKENS — Design A (Minimaliste Noir/Blanc)
   ═══════════════════════════════════════════ */
[data-design="A"] {
  --accent:        #111111;
  --accent-hover:  #333333;
  --accent-text:   #ffffff;
  --sidebar-bg:    #ffffff;
  --sidebar-text:  #555555;
  --tab-active-bg: #111111;
  --tab-active-tx: #ffffff;
  --header-bg:     #111111;
  --header-text:   #ffffff;
  --badge-bg:      #333333;
  --badge-text:    #ffffff;
  --input-border:  #dddddd;
  --input-focus:   #111111;
}
/* ═══════════════════════════════════════════
   TOKENS — Design C (Pro Bleu Marine)
   ═══════════════════════════════════════════ */
[data-design="C"] {
  --accent:        #0C447C;
  --accent-hover:  #185FA5;
  --accent-text:   #ffffff;
  --sidebar-bg:    #042C53;
  --sidebar-text:  #85B7EB;
  --tab-active-bg: rgba(255,255,255,0.15);
  --tab-active-tx: #ffffff;
  --header-bg:     #0C447C;
  --header-text:   #ffffff;
  --badge-bg:      #1D9E75;
  --badge-text:    #ffffff;
  --input-border:  #B5D4F4;
  --input-focus:   #0C447C;
}

/* ═══════════════════════════════════════════
   DARK MODE
   ═══════════════════════════════════════════ */
[data-theme="light"] {
  --bg:            #f5f5f3;
  --surface:       #ffffff;
  --border:        #e5e5e0;
  --text:          #1a1a18;
  --text-muted:    #888888;
  --text-hint:     #aaaaaa;
  --input-bg:      #fafaf8;
  --letter-bg:     #ffffff;
  --letter-border: #e5e5e0;
}
[data-theme="dark"] {
  --bg:            #1a1a18;
  --surface:       #242422;
  --border:        #333330;
  --text:          #f0ede8;
  --text-muted:    #888880;
  --text-hint:     #555550;
  --input-bg:      #2a2a28;
  --letter-bg:     #2a2a28;
  --letter-border: #333330;
}

/* ═══════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background 0.2s, color 0.2s;
}

/* ═══════════════════════════════════════════
   HEADER
   ═══════════════════════════════════════════ */
header {
  background: var(--header-bg);
  color: var(--header-text);
  padding: 0 20px;
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-title { font-size: 14px; font-weight: 600; color: var(--header-text); }
.badge {
  font-size: 11px; padding: 2px 10px; border-radius: 20px; font-weight: 600;
  background: var(--badge-bg); color: var(--badge-text);
}
.header-right { display: flex; align-items: center; gap: 6px; }

/* Boutons d'option dans le header */
.hbtn {
  padding: 5px 10px; font-size: 12px; font-family: inherit; cursor: pointer;
  border-radius: 6px; border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.1); color: var(--header-text);
  transition: background 0.15s;
}
.hbtn:hover { background: rgba(255,255,255,0.2); }
.hbtn.active { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.5); }

/* ═══════════════════════════════════════════
   LAYOUT
   ═══════════════════════════════════════════ */
.layout { display: flex; height: calc(100vh - 50px); }

/* ═══════════════════════════════════════════
   PANNEAU GAUCHE
   ═══════════════════════════════════════════ */
.panel-left {
  width: 300px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: background 0.2s, border-color 0.2s;
}

/* Onglets */
.tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab {
  flex: 1; padding: 11px 0; font-size: 12px; font-weight: 600;
  background: var(--sidebar-bg); color: var(--sidebar-text);
  border: none; cursor: pointer; border-bottom: 2px solid transparent;
  transition: color 0.15s, background 0.15s;
}
[data-design="A"] .tab { background: var(--surface); }
[data-design="A"] .tab.active { background: var(--tab-active-bg); color: var(--tab-active-tx); border-bottom-color: transparent; }
[data-design="C"] .tab { background: var(--sidebar-bg); color: var(--sidebar-text); }
[data-design="C"] .tab.active { background: var(--tab-active-bg); color: var(--tab-active-tx); }

.tab-content { display: none; flex: 1; overflow-y: auto; padding: 16px; flex-direction: column; gap: 12px; }
.tab-content.active { display: flex; }

/* Champs */
.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }

input, textarea, select {
  width: 100%; font-family: inherit; font-size: 12px;
  color: var(--text); background: var(--input-bg);
  border: 1px solid var(--input-border); border-radius: 7px;
  padding: 7px 9px; outline: none;
  transition: border-color 0.15s, background 0.15s;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--input-focus); background: var(--surface);
}
textarea { resize: vertical; line-height: 1.5; }

.sep { border: none; border-top: 1px solid var(--border); margin: 2px 0; }

/* Clé API */
.key-row { display: flex; gap: 6px; }
.key-row input { flex: 1; font-family: monospace; font-size: 11px; }
.btn-xs {
  padding: 0 9px; height: 33px; font-family: inherit; font-size: 11px;
  background: var(--input-bg); border: 1px solid var(--input-border);
  border-radius: 7px; cursor: pointer; color: var(--text-muted); white-space: nowrap;
}
.btn-xs:hover { border-color: var(--input-focus); color: var(--text); }

.key-saved { display:none; font-size:10px; background:#e8f5e9; color:#2e7d32; border:1px solid #c8e6c9; border-radius:20px; padding:2px 7px; font-weight:700; }
.hint { font-size: 10px; color: var(--text-hint); margin-top: 2px; }

/* Upload CV */
.cv-zone {
  border: 1.5px dashed var(--input-border); border-radius: 7px;
  padding: 12px; text-align: center; cursor: pointer;
  font-size: 11px; color: var(--text-hint); position: relative;
  transition: border-color 0.15s;
}
.cv-zone:hover { border-color: var(--input-focus); color: var(--text-muted); }
.cv-zone input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; border:none; background:none; padding:0; }
.cv-zone.ok { border-color:#2e7d32; color:#2e7d32; background:#f1faf3; }

/* Bouton sauvegarder profil */
.btn-save-profile {
  width: 100%; padding: 8px; font-family: inherit; font-size: 12px; font-weight: 600;
  color: var(--text-muted); background: var(--input-bg);
  border: 1px solid var(--input-border); border-radius: 7px; cursor: pointer;
}
.btn-save-profile:hover { border-color: var(--input-focus); color: var(--text); }

/* Zone bas : bouton générer */
.gen-area { padding: 12px 16px 12px; flex-shrink: 0; border-top: 1px solid var(--border); }
.btn-gen {
  width: 100%; padding: 10px; font-family: inherit; font-size: 13px; font-weight: 700;
  color: var(--accent-text); background: var(--accent);
  border: none; border-radius: 8px; cursor: pointer;
  transition: background 0.15s, opacity 0.15s;
}
.btn-gen:hover { background: var(--accent-hover); }
.btn-gen:disabled { opacity: 0.4; cursor: not-allowed; }

.status { display:none; align-items:center; gap:8px; font-size:11px; color:var(--text-muted); padding-top:8px; }
.spinner { width:13px; height:13px; border:2px solid var(--border); border-top-color:var(--text-muted); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ═══════════════════════════════════════════
   PANNEAU DROIT
   ═══════════════════════════════════════════ */
.panel-right { flex:1; display:flex; flex-direction:column; background:var(--bg); transition:background 0.2s; }

.right-toolbar {
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface); flex-shrink: 0;
}
.toolbar-left { display:flex; align-items:center; gap:12px; }
.toolbar-right { display:flex; align-items:center; gap:8px; }

.toolbar-label { font-size: 12px; font-weight: 600; color: var(--text-muted); }

/* Slider taille de police */
.size-control { display:flex; align-items:center; gap:8px; }
.size-control label { font-size:11px; color:var(--text-muted); white-space:nowrap; }
.size-control input[type="range"] {
  width: 80px; height: auto; padding: 0; border: none; background: none;
  accent-color: var(--accent);
}
.size-val { font-size:11px; color:var(--text); font-weight:600; min-width:28px; }

.btn-toolbar {
  display:none; padding:6px 12px; font-family:inherit; font-size:12px;
  color:var(--text-muted); background:var(--surface);
  border:1px solid var(--border); border-radius:7px; cursor:pointer;
}
.btn-toolbar:hover { border-color:var(--input-focus); color:var(--text); }
.btn-toolbar.show { display:block; }

.edit-hint { display:none; font-size:11px; color:var(--text-hint); font-style:italic; }
.edit-hint.show { display:block; }

/* Zone lettre */
.letter-area { flex:1; overflow-y:auto; padding:24px 32px; }

.letter-placeholder {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:400px; gap:10px; color:var(--text-hint); font-size:13px; text-align:center;
}

.error-box { color:#c0392b; background:#fdf0ef; border:1px solid #f5c6c2; border-radius:8px; padding:12px 16px; font-size:12px; }

/* ═══════════════════════════════════════════
   LETTRE
   ═══════════════════════════════════════════ */
.letter-wrapper {
  background: var(--letter-bg);
  border: 1px solid var(--letter-border);
  border-radius: 12px;
  padding: 40px 44px;
  line-height: 1.8;
  color: var(--text);
  max-width: 760px;
  margin: 0 auto;
  transition: background 0.2s, border-color 0.2s;
}

.letter-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:28px; }

.letter-sender { line-height:1.65; }
.sender-name { font-weight:700; display:block; margin-bottom:3px; }

.letter-recipient { text-align:right; line-height:1.65; }
.attn-label { font-style:italic; color:var(--text-muted); font-size:0.9em; display:block; margin-bottom:1px; }
.attn-service { display:block; }
.attn-company { display:block; font-weight:700; }
.attn-city { display:block; color:var(--text-muted); }

.letter-date { text-align:right; color:var(--text-muted); margin-bottom:18px; }

.letter-object {
  font-weight:700; margin-bottom:18px;
  border-left:3px solid var(--accent); padding-left:8px;
  border-radius:0;
}

.letter-salutation { margin-bottom:14px; }

.letter-body p { margin-bottom:14px; text-align:justify; }
.letter-body p:last-child { margin-bottom:0; }

.letter-politesse { margin-top:14px; margin-bottom:24px; }

.letter-sign { text-align:right; font-weight:700; }

/* Editable styles */
[contenteditable="true"] { outline:none; cursor:text; }
[contenteditable="true"]:hover { background:rgba(128,128,128,0.05); border-radius:4px; }
[contenteditable="true"]:focus { background:rgba(128,128,128,0.08); border-radius:4px; }

/* ═══════════════════════════════════════════
   IMPRESSION
   ═══════════════════════════════════════════ */
@media print {
  header, .panel-left, .right-toolbar { display:none !important; }
  .layout { height:auto; }
  .panel-right { background:white; }
  .letter-area { padding:0; }
  .letter-wrapper { border:none; border-radius:0; padding:18mm 20mm; max-width:100%; background:white; color:#000; }
  .letter-object { border-left-color:#000 !important; }
}
@page { size:A4; margin:0; }
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="header-left">
    <span class="header-title">Lettre de Motivation</span>
    <span class="badge">Groq · Gratuit</span>
  </div>
  <div class="header-right">
    <!-- Choix du design -->
    <button class="hbtn active" id="btnA" onclick="setDesign('A')">Design A</button>
    <button class="hbtn" id="btnC" onclick="setDesign('C')">Design C</button>
    <!-- Séparateur -->
    <span style="width:1px;height:18px;background:rgba(255,255,255,0.2);display:inline-block;margin:0 4px;"></span>
    <!-- Thème -->
    <button class="hbtn active" id="btnLight" onclick="setTheme('light')">☀ Clair</button>
    <button class="hbtn" id="btnDark" onclick="setTheme('dark')">☾ Sombre</button>
    <button class="hbtn" id="btnSystem" onclick="setTheme('system')">⚙ Système</button>
  </div>
</header>

<div class="layout">

  <!-- ══ PANNEAU GAUCHE ══ -->
  <div class="panel-left">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('profil')">👤 Profil</button>
      <button class="tab" onclick="switchTab('poste')">💼 Poste</button>
    </div>

    <!-- ONGLET PROFIL -->
    <div class="tab-content active" id="tab-profil">

      <div class="field-group">
        <label class="field-label">
          Clé API Groq
          <span class="key-saved" id="keySavedBadge">🔒 OK</span>
        </label>
        <div id="keySavedView" style="display:none;gap:6px;align-items:center;">
          <input type="password" value="••••••••••••••••••••" readonly style="flex:1;color:var(--text-hint);cursor:default;"/>
          <button class="btn-xs" onclick="resetKey()">Changer</button>
        </div>
        <div id="keyInputView" class="key-row">
          <input type="password" id="apiKey" placeholder="gsk_..."/>
          <button class="btn-xs" onclick="saveKey()">💾 Sauver</button>
        </div>
        <span class="hint" id="keyHint">Saisis ta clé puis clique Sauver</span>
      </div>

      <div class="sep"></div>

      <div class="field-group">
        <label class="field-label">Prénom Nom</label>
        <input type="text" id="userName" placeholder="Jean Dupont"/>
      </div>
      <div class="field-group">
        <label class="field-label">Adresse</label>
        <input type="text" id="userAddress" placeholder="12 rue de la Paix"/>
      </div>
      <div class="field-group">
        <label class="field-label">Ville & Code postal</label>
        <input type="text" id="userCity" placeholder="75001 Paris"/>
      </div>
      <div class="field-group">
        <label class="field-label">Téléphone</label>
        <input type="tel" id="userTel" placeholder="+33 6 00 00 00 00"/>
      </div>
      <div class="field-group">
        <label class="field-label">Email</label>
        <input type="email" id="userEmail" placeholder="prenom.nom@email.com"/>
      </div>

      <div class="sep"></div>

      <div class="field-group">
        <label class="field-label">CV (PDF)</label>
        <div class="cv-zone" id="cvZone">
          <input type="file" id="cvFile" accept=".pdf" onchange="loadCV(event)"/>
          <span id="cvZoneText">📄 Uploader ton CV (PDF)</span>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Ou colle le texte de ton CV</label>
        <textarea id="cvText" rows="5" placeholder="Expériences, formations, compétences..."></textarea>
      </div>

      <button class="btn-save-profile" onclick="saveProfile()">💾 Sauvegarder le profil</button>
      <span class="hint" id="profileHint"></span>

    </div>

    <!-- ONGLET POSTE -->
    <div class="tab-content" id="tab-poste">
      <div class="field-group">
        <label class="field-label">Entreprise</label>
        <input type="text" id="employer" placeholder="Ex: Safran Landing Systems"/>
      </div>
      <div class="field-group">
        <label class="field-label">Destinataire</label>
        <input type="text" id="recipient" placeholder="Ex: Responsable de recrutement"/>
      </div>
      <div class="field-group">
        <label class="field-label">Ville de l'employeur</label>
        <input type="text" id="employerCity" placeholder="Ex: Vélizy-Villacoublay"/>
      </div>
      <div class="sep"></div>
      <div class="field-group">
        <label class="field-label">Titre du poste</label>
        <input type="text" id="jobTitle" placeholder="Ex: Alternant Ingénieur Sécurité"/>
      </div>
      <div class="field-group">
        <label class="field-label">Description du poste</label>
        <textarea id="jobDesc" rows="11" placeholder="Collez ici la description complète..."></textarea>
      </div>
    </div>

    <!-- Bouton générer -->
    <div class="gen-area">
      <button class="btn-gen" id="genBtn" onclick="generate()">Générer la lettre →</button>
      <div class="status" id="statusBar">
        <div class="spinner"></div>
        <span>Génération en cours...</span>
      </div>
    </div>
  </div>

  <!-- ══ PANNEAU DROIT ══ -->
  <div class="panel-right">

    <div class="right-toolbar">
      <div class="toolbar-left">
        <span class="toolbar-label">Aperçu</span>
        <span class="edit-hint" id="editHint">✏ Cliquez sur le texte pour modifier</span>
      </div>
      <div class="toolbar-right">
        <!-- Taille de police -->
        <div class="size-control">
          <label>Taille :</label>
          <input type="range" id="fontSlider" min="9" max="16" step="1" value="13" oninput="updateFontSize(this.value)"/>
          <span class="size-val" id="fontVal">13px</span>
        </div>
        <button class="btn-toolbar" id="btnCopy" onclick="copyLetter()">Copier</button>
        <button class="btn-toolbar" id="btnPrint" onclick="window.print()">⬇ PDF</button>
      </div>
    </div>

    <div class="letter-area" id="letterArea">
      <div class="letter-placeholder">
        <span style="font-size:36px;">✉</span>
        <span>Remplis ton profil et le poste,<br>puis clique sur <strong>Générer la lettre</strong></span>
      </div>
    </div>

  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ── Thème ───────────────────────────────── */
let systemMq = window.matchMedia('(prefers-color-scheme: dark)');

function applyTheme(theme) {
  const root = document.documentElement;
  if (theme === 'system') {
    root.setAttribute('data-theme', systemMq.matches ? 'dark' : 'light');
  } else {
    root.setAttribute('data-theme', theme);
  }
}

function setTheme(t) {
  localStorage.setItem('lm_theme', t);
  applyTheme(t);
  ['Light','Dark','System'].forEach(x => {
    document.getElementById('btn'+x).classList.toggle('active', x.toLowerCase() === t);
  });
}

systemMq.addEventListener('change', () => {
  if (localStorage.getItem('lm_theme') === 'system') applyTheme('system');
});

/* ── Design ──────────────────────────────── */
function setDesign(d) {
  document.documentElement.setAttribute('data-design', d);
  localStorage.setItem('lm_design', d);
  document.getElementById('btnA').classList.toggle('active', d === 'A');
  document.getElementById('btnC').classList.toggle('active', d === 'C');
}

/* ── Onglets ─────────────────────────────── */
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

/* ── Clé API ─────────────────────────────── */
function loadKey() {
  if (localStorage.getItem('groq_api_key')) {
    document.getElementById('keyInputView').style.display = 'none';
    document.getElementById('keySavedView').style.display = 'flex';
    document.getElementById('keySavedBadge').style.display = 'inline';
    document.getElementById('keyHint').textContent = 'Clé chargée automatiquement 🔒';
  }
}
function saveKey() {
  const k = document.getElementById('apiKey').value.trim();
  if (!k.startsWith('gsk_')) return alert('Clé invalide. Elle doit commencer par gsk_');
  localStorage.setItem('groq_api_key', k);
  document.getElementById('apiKey').value = '';
  document.getElementById('keyInputView').style.display = 'none';
  document.getElementById('keySavedView').style.display = 'flex';
  document.getElementById('keySavedBadge').style.display = 'inline';
  document.getElementById('keyHint').textContent = 'Clé enregistrée 🔒';
}
function resetKey() {
  if (!confirm('Supprimer la clé enregistrée ?')) return;
  localStorage.removeItem('groq_api_key');
  document.getElementById('keySavedView').style.display = 'none';
  document.getElementById('keyInputView').style.display = 'flex';
  document.getElementById('keySavedBadge').style.display = 'none';
  document.getElementById('keyHint').textContent = 'Saisis ta clé puis clique Sauver';
}
function getKey() { return localStorage.getItem('groq_api_key') || document.getElementById('apiKey').value.trim(); }

/* ── Profil ──────────────────────────────── */
function saveProfile() {
  localStorage.setItem('user_profile', JSON.stringify({
    name:    document.getElementById('userName').value.trim(),
    address: document.getElementById('userAddress').value.trim(),
    city:    document.getElementById('userCity').value.trim(),
    tel:     document.getElementById('userTel').value.trim(),
    email:   document.getElementById('userEmail').value.trim(),
    cvText:  document.getElementById('cvText').value.trim()
  }));
  document.getElementById('profileHint').textContent = '✅ Profil sauvegardé';
  setTimeout(() => document.getElementById('profileHint').textContent = '', 2500);
}
function loadProfile() {
  const s = localStorage.getItem('user_profile');
  if (!s) return;
  const p = JSON.parse(s);
  document.getElementById('userName').value    = p.name    || '';
  document.getElementById('userAddress').value = p.address || '';
  document.getElementById('userCity').value    = p.city    || '';
  document.getElementById('userTel').value     = p.tel     || '';
  document.getElementById('userEmail').value   = p.email   || '';
  document.getElementById('cvText').value      = p.cvText  || '';
}
function getProfile() {
  return {
    name:    document.getElementById('userName').value.trim(),
    address: document.getElementById('userAddress').value.trim(),
    city:    document.getElementById('userCity').value.trim(),
    tel:     document.getElementById('userTel').value.trim(),
    email:   document.getElementById('userEmail').value.trim()
  };
}

/* ── CV Upload ───────────────────────────── */
async function loadCV(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('cvZoneText').textContent = '⏳ Lecture...';
  try {
    const ab  = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
    let text  = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page    = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(x => x.str).join(' ') + '\n';
    }
    document.getElementById('cvText').value = text;
    document.getElementById('cvZone').classList.add('ok');
    document.getElementById('cvZoneText').textContent = '✅ ' + file.name;
  } catch {
    document.getElementById('cvZoneText').textContent = '❌ Erreur lecture';
    document.getElementById('cvZone').classList.remove('ok');
  }
}

/* ── Taille de police ────────────────────── */
function updateFontSize(v) {
  document.getElementById('fontVal').textContent = v + 'px';
  const lw = document.getElementById('letterContent');
  if (lw) lw.style.fontSize = v + 'px';
}

/* ── Génération ──────────────────────────── */
function getToday() {
  return new Date().toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });
}

async function generate() {
  const apiKey       = getKey();
  const profile      = getProfile();
  const cvContent    = document.getElementById('cvText').value.trim();
  const employer     = document.getElementById('employer').value.trim();
  const recipient    = document.getElementById('recipient').value.trim();
  const employerCity = document.getElementById('employerCity').value.trim();
  const jobTitle     = document.getElementById('jobTitle').value.trim();
  const jobDesc      = document.getElementById('jobDesc').value.trim();

  if (!apiKey)       return alert('Aucune clé API. Renseigne-la dans l\'onglet Profil.');
  if (!profile.name) return alert('Renseigne ton nom dans l\'onglet Profil.');
  if (!cvContent)    return alert('Ajoute ton CV dans l\'onglet Profil.');
  if (!jobTitle)     return alert('Renseigne le titre du poste dans l\'onglet Poste.');
  if (!jobDesc)      return alert('Renseigne la description du poste.');

  document.getElementById('genBtn').disabled = true;
  document.getElementById('statusBar').style.display = 'flex';
  ['btnCopy','btnPrint'].forEach(id => document.getElementById(id).classList.remove('show'));

  const prompt = `Tu es un expert en rédaction de lettres de motivation françaises professionnelles.

RÈGLES STRICTES :
- Utilise UNIQUEMENT les informations présentes dans le CV fourni.
- N'invente aucun diplôme, école, entreprise ou compétence absente du CV.
- Évite les répétitions de mots comme "je suis convaincu", "particulièrement", "stimulant".
- Chaque paragraphe est séparé d'une LIGNE VIDE.
- La formule de politesse est sur sa propre ligne, séparée du dernier paragraphe par une LIGNE VIDE.
- Retourne UNIQUEMENT le corps de la lettre : pas d'objet, pas de date, pas de coordonnées.

CV DU CANDIDAT :
---
${cvContent.slice(0, 3000)}
---

POSTE : ${jobTitle}
EMPLOYEUR : ${employer}
DESCRIPTION :
${jobDesc.slice(0, 2000)}

Structure :
- Paragraphe 1 : accroche, lien formation/expérience avec ce poste
- Paragraphe 2 : expériences concrètes du CV liées aux missions
- Paragraphe 3 : motivation pour cet employeur + disponibilité

[ligne vide]
Formule de politesse seule sur sa ligne.`;

  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.4
      })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'Erreur API'); }
    const data = await res.json();
    const text = data.choices?.[0]?.message?.content || '';
    if (!text) throw new Error('Réponse vide.');
    renderLetter({ profile, employer, recipient, employerCity, jobTitle, body: text });
    ['btnCopy','btnPrint'].forEach(id => document.getElementById(id).classList.add('show'));
    document.getElementById('editHint').classList.add('show');
    const fs = document.getElementById('fontSlider').value;
    document.getElementById('letterContent').style.fontSize = fs + 'px';
  } catch(e) {
    document.getElementById('letterArea').innerHTML = `<div class="error-box">Erreur : ${e.message}</div>`;
  }

  document.getElementById('genBtn').disabled = false;
  document.getElementById('statusBar').style.display = 'none';
}

/* ── Rendu lettre ────────────────────────── */
function renderLetter({ profile, employer, recipient, employerCity, jobTitle, body }) {
  const blocks = body.split(/\n\s*\n/).map(b => b.trim()).filter(b => b.length > 0);
  const politesse = blocks.length > 1 ? blocks.pop() : 'Dans l\'attente de votre retour, je vous adresse mes cordiales salutations.';
  const parasHtml = blocks.map(b => `<p>${b.replace(/\n/g, ' ')}</p>`).join('');

  document.getElementById('letterArea').innerHTML = `
    <div class="letter-wrapper" id="letterContent">
      <div class="letter-header">
        <div class="letter-sender" contenteditable="true">
          <span class="sender-name">${profile.name}</span>
          ${profile.address ? profile.address + '<br>' : ''}
          ${profile.city    ? profile.city    + '<br>' : ''}
          ${profile.tel     ? profile.tel     + '<br>' : ''}
          ${profile.email   || ''}
        </div>
        <div class="letter-recipient" contenteditable="true">
          <span class="attn-label">À l'attention de :</span>
          <span class="attn-service">${recipient || 'Service des Ressources Humaines'}</span>
          <span class="attn-company">${employer}</span>
          <span class="attn-city">${employerCity}</span>
        </div>
      </div>
      <div class="letter-date" contenteditable="true">Fait à Paris, le ${getToday()}</div>
      <div class="letter-object" contenteditable="true">Objet : Candidature – ${jobTitle}</div>
      <div class="letter-salutation" contenteditable="true">Madame, Monsieur,</div>
      <div class="letter-body" contenteditable="true">${parasHtml}</div>
      <div class="letter-politesse" contenteditable="true">${politesse}</div>
      <div class="letter-sign" contenteditable="true">${profile.name}</div>
    </div>`;
}

/* ── Copie ───────────────────────────────── */
function copyLetter() {
  const el = document.getElementById('letterContent');
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = 'Copié !';
    setTimeout(() => btn.textContent = 'Copier', 2000);
  });
}

/* ── Init ────────────────────────────────── */
(function init() {
  const savedTheme  = localStorage.getItem('lm_theme')  || 'light';
  const savedDesign = localStorage.getItem('lm_design') || 'A';
  applyTheme(savedTheme);
  setTheme(savedTheme);
  setDesign(savedDesign);
  loadKey();
  loadProfile();
})();
</script>
